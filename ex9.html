<!DOCTYPE html>
<html>
<head>
<title>Event Mapping</title>
<style>
body { font-family: sans-serif; padding: 20px; }
button { padding: 10px; cursor: pointer; }
#status { margin-top: 10px; font-weight: bold; }
</style>
</head>
<body>
<h2>Find Nearby Events</h2>

<button onclick="getLocation()">Find Nearby Events</button>
<div id="status"></div>

<script>
function getLocation() {
  const status = document.getElementById('status');
  status.textContent = 'Locating...';

  if (navigator.geolocation) {
    const options = {
      enableHighAccuracy: true,
      timeout: 5000,
      maximumAge: 0
    };
    navigator.geolocation.getCurrentPosition(showPosition, showError, options);
  } else {
    status.textContent = "Geolocation is not supported by this browser.";
  }
}

function showPosition(position) {
  const status = document.getElementById('status');
  status.innerHTML = "Latitude: " + position.coords.latitude + 
                     "<br>Longitude: " + position.coords.longitude;
}

function showError(error) {
  const status = document.getElementById('status');
  switch(error.code) {
    case error.PERMISSION_DENIED:
      status.textContent = "User denied the request for Geolocation.";
      break;
    case error.POSITION_UNAVAILABLE:
      status.textContent = "Location information is unavailable.";
      break;
    case error.TIMEOUT:
      status.textContent = "The request to get user location timed out.";
      break;
    case error.UNKNOWN_ERROR:
      status.textContent = "An unknown error occurred.";
      break;
  }
}
</script>
</body>
</html>
