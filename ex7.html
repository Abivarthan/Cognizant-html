<!DOCTYPE html>
<html>
<head>
<title>Video Invite</title>
<style>
body { font-family: sans-serif; padding: 20px; }
#videoMsg { margin-top: 10px; font-weight: bold; color: blue; }
</style>
</head>
<body>
<h2>Event Promo Video</h2>

<video id="promoVideo" width="400" controls oncanplay="videoReady()">
  <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
</video>
<div id="videoMsg">Loading video...</div>

<form style="margin-top:20px;">
  <p>Please fill out to continue:</p>
  <input type="text" placeholder="Name" oninput="hasChanges = true">
</form>

<script>
let hasChanges = false;

function videoReady() {
  document.getElementById('videoMsg').textContent = 'Video ready to play!';
}

window.onbeforeunload = function(e) {
  if (hasChanges) {
    e.preventDefault();
    e.returnValue = 'You have unsaved changes. Are you sure you want to leave?';
  }
};
</script>
</body>
</html>
