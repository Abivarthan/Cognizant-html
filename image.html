<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Events Gallery</title>
    <style>
        table.gallery{
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        table.gallery td{
            text-align: center;
            padding: 10px;
            vertical-align: top;
        }
        .event-img{
            width: 200px;
            height: 150px;
            object-fit: cover;
            border: 3px solid #555;
            border-radius: 6px;
            display: block;
            margin: 0 auto 8px auto;
        }
        caption{
            caption-side: top;
            font-weight: bold;
            margin-bottom: 8px;
        }
        figcaption{
            font-size: 0.9rem;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Community Events Gallery</h1>
    <table class="gallery">
        <caption>Photos from past community events</caption>
        <tr>
            <td>
                <figure>
                    <img src="https://via.placeholder.com/400x300?text=Event+1" alt="Community Cleanup" title="Community Cleanup" class="event-img">
                    <figcaption>Community Cleanup - Park restoration day</figcaption>
                </figure>
            </td>
            <td>
                <figure>
                    <img src="https://via.placeholder.com/400x300?text=Event+2" alt="Charity Run" title="Charity Run" class="event-img">
                    <figcaption>Charity Run - 5K fundraiser</figcaption>
                </figure>
            </td>
            <td>
                <figure>
                    <img src="https://via.placeholder.com/400x300?text=Event+3" alt="Food Drive" title="Food Drive" class="event-img">
                    <figcaption>Food Drive - Donations for families</figcaption>
                </figure>
            </td>
        </tr>
        <tr>
            <td>
                <figure>
                    <img src="https://via.placeholder.com/400x300?text=Event+4" alt="Workshop" title="Community Workshop" class="event-img">
                    <figcaption>Community Workshop - Skill-sharing session</figcaption>
                </figure>
            </td>
            <td>
                <figure>
                    <img src="https://via.placeholder.com/400x300?text=Event+5" alt="Festival" title="Neighborhood Festival" class="event-img">
                    <figcaption>Neighborhood Festival - Music and food</figcaption>
                </figure>
            </td>
            <td>
                <figure>
                    <img src="https://via.placeholder.com/400x300?text=Event+6" alt="Tree Planting" title="Tree Planting" class="event-img">
                    <figcaption>Tree Planting - Greening our streets</figcaption>
                </figure>
            </td>
        </tr>
    </table>
</body>
</html>
